name: build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      upstream_version:
        description: "RustDesk upstream version to fork from (empty = branding/branding.env)"
        required: false
        default: ""
      only:
        description: "Comma list of platform jobs to run: linux,macos,windows (empty = all). Saves CI minutes on partial rebuilds."
        required: false
        default: ""

env:
  RUST_VERSION: "1.75"
  MAC_RUST_VERSION: "1.81"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"

jobs:
  # ===========================================================================
  # CONFIG — single source of truth for UPSTREAM_VERSION (branding.env unless
  # workflow_dispatch overrides it).
  # ===========================================================================
  config:
    runs-on: ubuntu-22.04
    outputs:
      upstream_version: ${{ steps.ver.outputs.upstream_version }}
    steps:
      - uses: actions/checkout@v4
      - id: ver
        name: Resolve UPSTREAM_VERSION
        run: |
          INPUT="${{ github.event.inputs.upstream_version }}"
          FILE_VER="$(grep -E '^UPSTREAM_VERSION=' branding/branding.env | head -1 | cut -d= -f2- | tr -d '"')"
          if [[ -n "$INPUT" ]]; then
            VER="$INPUT"
            echo "Using workflow_dispatch override: $VER"
          else
            VER="$FILE_VER"
            echo "Using branding/branding.env: $VER"
          fi
          if [[ -z "$VER" ]]; then
            echo "❌ could not resolve UPSTREAM_VERSION" >&2
            exit 1
          fi
          echo "upstream_version=$VER" >> "$GITHUB_OUTPUT"

  # ===========================================================================
  # BRIDGE — generate flutter_rust_bridge codegen once for all platforms.
  # ===========================================================================
  bridge:
    needs: config
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    env:
      UPSTREAM_VERSION: ${{ needs.config.outputs.upstream_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake curl gcc git g++ \
            libssl-dev pkg-config python3 wget unzip

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Fetch upstream RustDesk
        run: |
          rm -rf rustdesk
          git clone --depth 1 --branch "${UPSTREAM_VERSION}" --recurse-submodules \
            https://github.com/rustdesk/rustdesk.git rustdesk

      - name: Install flutter_rust_bridge_codegen
        run: |
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --features uuid --locked

      - name: Generate bridge
        working-directory: rustdesk
        run: |
          pushd flutter && sed -i -e 's/extended_text: 14.0.0/extended_text: 13.0.0/g' pubspec.yaml && flutter pub get && popd
          ~/.cargo/bin/flutter_rust_bridge_codegen \
            --rust-input ./src/flutter_ffi.rs \
            --dart-output ./flutter/lib/generated_bridge.dart \
            --c-output ./flutter/macos/Runner/bridge_generated.h
          cp ./flutter/macos/Runner/bridge_generated.h ./flutter/ios/Runner/bridge_generated.h

      - uses: actions/upload-artifact@v4
        with:
          name: bridge-artifact
          path: |
            rustdesk/src/bridge_generated.rs
            rustdesk/src/bridge_generated.io.rs
            rustdesk/flutter/lib/generated_bridge.dart
            rustdesk/flutter/lib/generated_bridge.freezed.dart
            rustdesk/flutter/macos/Runner/bridge_generated.h
            rustdesk/flutter/ios/Runner/bridge_generated.h

  # ===========================================================================
  # LINUX — produces .deb
  # ===========================================================================
  linux:
    needs: [config, bridge]
    if: ${{ github.event.inputs.only == '' || contains(github.event.inputs.only, 'linux') }}
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    env:
      UPSTREAM_VERSION: ${{ needs.config.outputs.upstream_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Maximize build space
        run: |
          sudo rm -rf /opt/ghc /usr/local/lib/android /usr/share/dotnet
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang cmake curl gcc git g++ \
            libayatana-appindicator3-dev libasound2-dev libclang-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgtk-3-dev \
            libpam0g-dev libpulse-dev libva-dev \
            libunwind-dev libdw-dev libdwarf-dev \
            libxcb-randr0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxdo-dev libxfixes-dev llvm-dev nasm ninja-build pkg-config \
            tree python3 rpm unzip wget xz-utils libssl-dev imagemagick

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-unknown-linux-gnu
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rustdesk

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Setup vcpkg + cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg deps
        run: |
          $VCPKG_ROOT/vcpkg install --triplet x64-linux libvpx libyuv opus aom libjpeg-turbo

      - name: Fetch upstream RustDesk
        run: |
          rm -rf rustdesk
          git clone --depth 1 --branch "${UPSTREAM_VERSION}" --recurse-submodules \
            https://github.com/rustdesk/rustdesk.git rustdesk

      - name: Apply Mixel-Remote branding
        run: ./scripts/apply-branding.sh
        env:
          RDREPO: ./rustdesk
          BRANDING: ./branding

      - name: Restore bridge files
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: rustdesk

      - name: Build (cargo + flutter via build.py)
        working-directory: rustdesk
        run: |
          export VCPKG_ROOT="${{ github.workspace }}/vcpkg"
          python3 build.py --flutter

      - name: Locate .deb
        id: locate
        run: |
          deb=$(find rustdesk -name "*.deb" | head -n1)
          if [[ -z "$deb" ]]; then
            echo "❌ no .deb produced" >&2
            find rustdesk -maxdepth 4 -name "*.deb" -o -name "mixel-remote*" -o -name "rustdesk*" | head -20
            exit 1
          fi
          mkdir -p dist
          cp "$deb" "dist/mixel-remote-${UPSTREAM_VERSION}-x86_64.deb"
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/

  # ===========================================================================
  # macOS — arm64 + x86_64 on macos-14 (macos-13 runners starve / never start).
  # x86_64 is cross-built on the Apple Silicon runner via the Rust target.
  # ===========================================================================
  macos:
    needs: [config, bridge]
    if: ${{ github.event.inputs.only == '' || contains(github.event.inputs.only, 'macos') }}
    strategy:
      fail-fast: false
      matrix:
        job:
          - { arch: aarch64, target: aarch64-apple-darwin }
          - { arch: x86_64,  target: x86_64-apple-darwin }
    runs-on: macos-14
    timeout-minutes: 180
    env:
      UPSTREAM_VERSION: ${{ needs.config.outputs.upstream_version }}
      APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
      APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
      APPLE_NOTARY_USER:     ${{ secrets.APPLE_NOTARY_USER }}
      APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
      APPLE_NOTARY_TEAM_ID:  ${{ secrets.APPLE_NOTARY_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build runtime
        run: |
          brew install autoconf automake libtool pkg-config create-dmg imagemagick
          wget https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/macosx/nasm-2.16.03-macosx.zip
          unzip -q nasm-2.16.03-macosx.zip
          sudo cp nasm-2.16.03/nasm /usr/local/bin/nasm
          nasm --version
          # Rosetta helps some Intel toolchain bits when cross-building x86_64.
          if [[ "${{ matrix.job.arch }}" == "x86_64" ]]; then
            softwareupdate --install-rosetta --agree-to-license || true
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.MAC_RUST_VERSION }}
          targets: ${{ matrix.job.target }}
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rustdesk
          prefix-key: macos-14-${{ matrix.job.arch }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Setup vcpkg + cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg deps
        run: |
          triplet=${{ matrix.job.arch == 'aarch64' && 'arm64-osx' || 'x64-osx' }}
          $VCPKG_ROOT/vcpkg install --triplet $triplet libvpx libyuv opus aom libjpeg-turbo

      - name: Fetch upstream RustDesk
        run: |
          rm -rf rustdesk
          git clone --depth 1 --branch "${UPSTREAM_VERSION}" --recurse-submodules \
            https://github.com/rustdesk/rustdesk.git rustdesk

      - name: Apply Mixel-Remote branding
        run: ./scripts/apply-branding.sh
        env:
          RDREPO: ./rustdesk
          BRANDING: ./branding

      - name: Restore bridge files
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: rustdesk

      - name: Import Apple Developer ID cert
        if: env.APPLE_CERT_P12_BASE64 != ''
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
          keychain: mixel-build

      - name: Build (cargo + flutter via build.py)
        working-directory: rustdesk
        run: |
          export VCPKG_ROOT="${{ github.workspace }}/vcpkg"
          export CARGO_BUILD_TARGET="${{ matrix.job.target }}"
          if [ "${{ matrix.job.arch }}" = "aarch64" ]; then
            export FLUTTER_XCODE_ARCHS="arm64"
          else
            export FLUTTER_XCODE_ARCHS="x86_64"
          fi
          if [ "${{ matrix.job.target }}" = "aarch64-apple-darwin" ]; then
            sed -i '' -e "s/MACOSX_DEPLOYMENT_TARGET=[0-9]*\\.[0-9]*/MACOSX_DEPLOYMENT_TARGET=12.3/" build.py
          fi
          for attempt in 1 2 3; do
            if python3 build.py --flutter --unix-file-copy-paste; then
              echo "✓ build succeeded on attempt $attempt"
              exit 0
            fi
            echo "⚠ build attempt $attempt failed; retrying after 30s"
            sleep 30
          done
          echo "❌ build failed after 3 attempts"
          exit 1

      - name: Package + sign + notarize (.app then .dmg)
        working-directory: rustdesk
        run: |
          set -euo pipefail
          APP_PATH="flutter/build/macos/Build/Products/Release/Mixel-Remote.app"
          if [[ ! -d "$APP_PATH" ]]; then
            APP_PATH="flutter/build/macos/Build/Products/Release/RustDesk.app"
          fi
          if [[ ! -d "$APP_PATH" ]]; then
            echo "❌ no .app produced" >&2
            find flutter/build -maxdepth 6 -name "*.app" || true
            exit 1
          fi

          # Normalize on-disk name to Mixel-Remote.app for customer-facing DMGs.
          APP_DIR="$(dirname "$APP_PATH")"
          if [[ "$(basename "$APP_PATH")" != "Mixel-Remote.app" ]]; then
            rm -rf "$APP_DIR/Mixel-Remote.app"
            mv "$APP_PATH" "$APP_DIR/Mixel-Remote.app"
            APP_PATH="$APP_DIR/Mixel-Remote.app"
          fi

          mkdir -p ../dist
          DMG="../dist/mixel-remote-${UPSTREAM_VERSION}-${{ matrix.job.arch }}.dmg"
          rm -f "$DMG"

          if [[ -n "${APPLE_CERT_P12_BASE64:-}" ]]; then
            CODESIGN_ID=$(security find-identity -v -p codesigning \
              | grep "Developer ID Application" | head -n1 | awk '{print $2}')
            if [[ -z "$CODESIGN_ID" ]]; then
              echo "❌ no Developer ID Application identity in keychain" >&2
              security find-identity -v -p codesigning >&2 || true
              exit 1
            fi

            # 1) Sign .app
            codesign --force --options runtime --timestamp --deep --strict \
              -s "$CODESIGN_ID" "$APP_PATH" -vvv
            codesign --verify --deep --strict --verbose=2 "$APP_PATH"

            # 2) Notarize + staple the .app ITSELF (required for stable TCC grants
            #    after the user drags .app → /Applications). See
            #    scripts/local/sign-and-publish-macos.sh for the full rationale.
            APP_ZIP="../dist/Mixel-Remote-${{ matrix.job.arch }}.zip"
            rm -f "$APP_ZIP"
            ditto -c -k --keepParent "$APP_PATH" "$APP_ZIP"
            xcrun notarytool submit "$APP_ZIP" \
              --apple-id "$APPLE_NOTARY_USER" \
              --password "$APPLE_NOTARY_PASSWORD" \
              --team-id  "$APPLE_NOTARY_TEAM_ID" \
              --wait
            rm -f "$APP_ZIP"
            xcrun stapler staple "$APP_PATH"
            xcrun stapler validate "$APP_PATH"

            # 3) Package stapled .app into DMG, then sign/notarize/staple DMG.
            create-dmg --window-size 800 400 \
              --icon "Mixel-Remote.app" 200 190 \
              --hide-extension "Mixel-Remote.app" \
              --app-drop-link 600 185 \
              "$DMG" "$APP_PATH"
            codesign --force --options runtime --timestamp --deep --strict \
              -s "$CODESIGN_ID" "$DMG" -vvv
            xcrun notarytool submit "$DMG" \
              --apple-id "$APPLE_NOTARY_USER" \
              --password "$APPLE_NOTARY_PASSWORD" \
              --team-id  "$APPLE_NOTARY_TEAM_ID" \
              --wait
            xcrun stapler staple "$DMG"
            xcrun stapler validate "$DMG"
          else
            create-dmg --window-size 800 400 \
              --icon "Mixel-Remote.app" 200 190 \
              --hide-extension "Mixel-Remote.app" \
              --app-drop-link 600 185 \
              "$DMG" "$APP_PATH"
            echo "⚠ Built unsigned DMG (no APPLE_CERT_P12_BASE64 secret)"
          fi
          ls -la ../dist/

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.job.arch }}
          path: dist/

  # ===========================================================================
  # WINDOWS — produces .exe (+ .msi if WiX present), optional Authenticode.
  # ===========================================================================
  windows:
    needs: [config, bridge]
    if: ${{ github.event.inputs.only == '' || contains(github.event.inputs.only, 'windows') }}
    runs-on: windows-2022
    timeout-minutes: 180
    env:
      UPSTREAM_VERSION: ${{ needs.config.outputs.upstream_version }}
      WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
      WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rustdesk

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Setup vcpkg + cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg deps
        shell: bash
        run: |
          $VCPKG_ROOT/vcpkg install --triplet x64-windows-static libvpx libyuv opus aom libjpeg-turbo

      - name: Install ImageMagick (for branding .ico)
        shell: bash
        run: |
          choco install imagemagick -y --no-progress || choco install imagemagick.app -y --no-progress || true
          MAGICK_DIR=$(ls -d /c/Program\ Files/ImageMagick-* 2>/dev/null | head -1 || true)
          if [[ -n "$MAGICK_DIR" ]]; then
            "$MAGICK_DIR/magick.exe" -version | head -1
          else
            echo "⚠ ImageMagick not found after choco install — branding will skip .ico regen if magick missing"
          fi

      - name: Fetch upstream RustDesk
        shell: bash
        run: |
          rm -rf rustdesk
          git clone --depth 1 --branch "${UPSTREAM_VERSION}" --recurse-submodules \
            https://github.com/rustdesk/rustdesk.git rustdesk

      - name: Apply Mixel-Remote branding
        shell: bash
        run: |
          export PATH="/c/Program Files/ImageMagick-7*:/c/ProgramData/chocolatey/bin:$PATH"
          # Resolve ImageMagick install dir (versioned folder name).
          MAGICK_DIR=$(ls -d /c/Program\ Files/ImageMagick-* 2>/dev/null | head -1 || true)
          if [[ -n "$MAGICK_DIR" ]]; then
            export PATH="$MAGICK_DIR:$PATH"
          fi
          ./scripts/apply-branding.sh
        env:
          RDREPO: ./rustdesk
          BRANDING: ./branding

      - name: Restore bridge files
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: rustdesk

      - name: Build (cargo + flutter via build.py)
        shell: bash
        working-directory: rustdesk
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: |
          python build.py --flutter

      - name: Locate + rebrand icon + optional Authenticode
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          installer=$(find rustdesk -maxdepth 2 \( -name "mixel-remote-*-install.exe" -o -name "rustdesk-*-install.exe" \) | head -n1 || true)
          if [[ -z "$installer" ]]; then
            echo "❌ no mixel-remote-*-install.exe (or rustdesk-*-install.exe) found"
            find rustdesk -maxdepth 4 -name "*.exe" | head -20
            exit 1
          fi

          OUT="dist/mixel-remote-${UPSTREAM_VERSION}-x86_64.exe"
          cp "$installer" "$OUT"

          msi=$(find rustdesk -maxdepth 5 -name "*.msi" | head -n1 || true)
          if [[ -n "$msi" ]]; then
            cp "$msi" "dist/mixel-remote-${UPSTREAM_VERSION}-x86_64.msi"
          fi

          # Prefer ico produced by apply-branding; else build from PNGs.
          ICO="rustdesk/res/icon.ico"
          if [[ ! -f "$ICO" ]]; then
            MAGICK_DIR=$(ls -d /c/Program\ Files/ImageMagick-* 2>/dev/null | head -1 || true)
            if [[ -n "$MAGICK_DIR" ]]; then
              export PATH="$MAGICK_DIR:/c/ProgramData/chocolatey/bin:$PATH"
            fi
            magick \
              branding/icon-16.png branding/icon-32.png branding/icon-48.png \
              branding/icon-64.png branding/icon-128.png branding/icon-256.png \
              dist/mixel-remote.ico
            ICO="dist/mixel-remote.ico"
          fi

          python -m pip install --user pefile
          python scripts/local/swap-windows-exe-icon.py \
            "$OUT" "$ICO" "dist/mixel-remote-iconfixed.exe"
          mv "dist/mixel-remote-iconfixed.exe" "$OUT"
          rm -f dist/mixel-remote.ico

          if [[ -n "${WINDOWS_CERT_PFX_BASE64:-}" ]]; then
            echo "$WINDOWS_CERT_PFX_BASE64" | base64 --decode > dist/windows-code-sign.pfx
            SIGNTOOL=$(find "/c/Program Files (x86)/Windows Kits/10/bin" -name signtool.exe 2>/dev/null | sort -r | head -n1 || true)
            if [[ -n "$SIGNTOOL" ]]; then
              "$SIGNTOOL" sign //f dist/windows-code-sign.pfx //p "$WINDOWS_CERT_PASSWORD" \
                //tr http://timestamp.digicert.com //td sha256 //fd sha256 "$OUT"
              if [[ -f "dist/mixel-remote-${UPSTREAM_VERSION}-x86_64.msi" ]]; then
                "$SIGNTOOL" sign //f dist/windows-code-sign.pfx //p "$WINDOWS_CERT_PASSWORD" \
                  //tr http://timestamp.digicert.com //td sha256 //fd sha256 \
                  "dist/mixel-remote-${UPSTREAM_VERSION}-x86_64.msi" || true
              fi
              echo "✓ Authenticode signed with signtool"
            else
              choco install osslsigncode -y --no-progress || true
              if command -v osslsigncode >/dev/null 2>&1; then
                osslsigncode sign -pkcs12 dist/windows-code-sign.pfx \
                  -pass "$WINDOWS_CERT_PASSWORD" \
                  -t http://timestamp.digicert.com \
                  -in "$OUT" -out "${OUT}.signed"
                mv "${OUT}.signed" "$OUT"
                echo "✓ Authenticode signed with osslsigncode"
              else
                echo "⚠ WINDOWS_CERT set but no signtool/osslsigncode — left unsigned"
              fi
            fi
            rm -f dist/windows-code-sign.pfx
          else
            echo "⚠ WINDOWS_CERT_PFX_BASE64 not set — shipping unsigned Windows exe"
          fi

          cp "$OUT" "dist/Mixel-Remote-Support-Windows.exe"
          ls -la dist/

      # Azure Trusted Signing (Artifact Signing) — account mixel-codesigning,
      # profile mixel-remote (Public Trust, CN=Mixel International Services
      # SARLS). Signs every exe/msi in dist/ including the customer-facing
      # aliases. Service principal: mixel-remote-signing-ci with the
      # "Artifact Signing Certificate Profile Signer" role only.
      # NOTE: signing changes bytes → a fresh build starts with zero
      # SmartScreen reputation regardless; the signature makes the warning
      # milder, shows a real publisher, and builds reputation faster.
      - name: Sign with Azure Trusted Signing
        uses: azure/trusted-signing-action@v2
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://weu.codesigning.azure.net/
          trusted-signing-account-name: mixel-codesigning
          certificate-profile-name: mixel-remote
          files-folder: ${{ github.workspace }}\dist
          files-folder-filter: exe,msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/

  # ===========================================================================
  # Upload — R2, including stable customer-facing aliases.
  # ===========================================================================
  upload:
    needs: [linux, macos, windows]
    if: always()
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts + customer aliases
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -type f \( -name "*.deb" -o -name "*.dmg" -o -name "*.exe" -o -name "*.msi" \) -exec cp {} dist/ \;

          # Stable names linked from mixel-ism /remote-support (cache-busted there).
          shopt -s nullglob
          for f in dist/mixel-remote-*-aarch64.dmg; do
            cp "$f" dist/Mixel-Remote-Support-Apple-Silicon.dmg
          done
          for f in dist/mixel-remote-*-x86_64.dmg; do
            cp "$f" dist/Mixel-Remote-Support-Intel.dmg
          done
          for f in dist/mixel-remote-*-x86_64.exe; do
            # Prefer the already-aliased copy from the windows job if present.
            if [[ ! -f dist/Mixel-Remote-Support-Windows.exe ]]; then
              cp "$f" dist/Mixel-Remote-Support-Windows.exe
            fi
            # Also copy to Mixel-Remote-Support.exe to align with mixel-ism links!
            cp "$f" dist/Mixel-Remote-Support.exe
          done
          for f in dist/mixel-remote-*-x86_64.msi; do
            cp "$f" dist/Mixel-Remote-Support.msi
          done
          for f in dist/mixel-remote-*-x86_64.deb; do
            cp "$f" dist/Mixel-Remote-Support.deb
          done
          ls -la dist/

      - name: Upload to R2
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            echo "ℹ CLOUDFLARE_API_TOKEN not set — skipping R2 upload."
            exit 0
          fi
          if [[ ! -d dist ]] || [[ -z "$(ls -A dist 2>/dev/null)" ]]; then
            echo "⚠ no artifacts to upload (platform jobs may have failed)"
            exit 0
          fi
          npm install -g wrangler@4
          for f in dist/*; do
            name=$(basename "$f")
            echo "→ uploading $name"
            wrangler r2 object put "mixel-remote-binaries/$name" --file "$f" --remote
          done
