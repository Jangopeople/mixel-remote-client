# Sentinel Code Guard (self-contained, distributed to all Jangopeople repos)
#
# Runs free OSS scanners (Gitleaks, Semgrep, Trivy) on every push/PR and reports
# findings into MIXEL Sentinel. The reporter is inlined (base64) so this is the
# ONLY file each repo needs. Managed centrally from Jangopeople/mixel-sentinel.
name: Sentinel Code Guard

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      IS_FORK: ${{ github.event.pull_request.head.repo.fork || false }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: scope
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "scope=diff" >> "$GITHUB_OUTPUT"
          else
            echo "scope=full" >> "$GITHUB_OUTPUT"
          fi

      - name: Gitleaks (secrets)
        run: |
          VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --source=. --no-git --report-format=json --report-path=gitleaks.json --exit-code=0 || true

      - name: Semgrep (static analysis)
        run: |
          python3 -m pip install --quiet semgrep==1.85.0
          semgrep --config=auto --json --output=semgrep.json --quiet || true

      - name: Trivy (dependencies)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin v0.71.0
          trivy fs --scanners vuln --format json --output trivy.json --quiet . || true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Report to Sentinel
        if: ${{ env.IS_FORK == 'false' }}
        env:
          SENTINEL_INGEST_URL: ${{ secrets.SENTINEL_INGEST_URL }}
          SENTINEL_ORG_ID: ${{ vars.SENTINEL_ORG_ID }}
          SENTINEL_APP_SLUG: ${{ vars.SENTINEL_APP_SLUG }}
          SENTINEL_INGEST_SIGNING_KEY: ${{ secrets.SENTINEL_INGEST_SIGNING_KEY }}
          CODE_GUARD_SCOPE: ${{ steps.scope.outputs.scope }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
